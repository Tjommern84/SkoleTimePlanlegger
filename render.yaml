services:
  - type: web
    name: lise-timeplan-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: IS_PRODUCTION
        value: "true"
      # Postgres connection string from Supabase (or any managed Postgres).
      # Paste it as-is; psycopg2-binary understands the plain postgresql://
      # scheme, no need to rewrite it to postgresql+psycopg://.
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Comma-separated, e.g. lise@example.com,colleague@example.com
      - key: ALLOWED_EMAILS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      # This service's own public URL + /auth/callback -- must exactly
      # match an Authorized redirect URI in Google Cloud Console.
      - key: OAUTH_REDIRECT_BASE_URL
        sync: false
      # The deployed Vercel frontend's URL (no trailing slash).
      - key: FRONTEND_URL
        sync: false
