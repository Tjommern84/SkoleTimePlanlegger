services:
  - type: web
    name: lise-timeplan-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: IS_PRODUCTION
        value: "true"
      # Postgres connection string from Supabase (or any managed Postgres).
      # Paste it as-is; psycopg2-binary understands the plain postgresql://
      # scheme, no need to rewrite it to postgresql+psycopg://.
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Deliberately not set: the login allowlist was replaced by
      # multi-tenant "zones" (any Google account can log in; access is
      # per-zone, granted via invitation). Do NOT set this on a fresh
      # database -- app/db/migrations/versions/a3f9c1d02b4e reads it only
      # to backfill zone ownership for *pre-existing* data, and expects a
      # matching users row to already exist. On an empty prod DB that row
      # can't exist yet, so setting this would crash the migration.
      - key: SESSION_SECRET
        generateValue: true
      # This service's own public URL + /auth/callback -- must exactly
      # match an Authorized redirect URI in Google Cloud Console.
      - key: OAUTH_REDIRECT_BASE_URL
        sync: false
      # The deployed Vercel frontend's URL (no trailing slash).
      - key: FRONTEND_URL
        sync: false
